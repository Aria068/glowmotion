<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>CI release — glowmotion</title>
<style>:root { --bg:#030712;--grid:#0d1526;--card-bg:#050b18;--border:#1b2740;--border-hi:#2c3d5f;--text:#e6edf6;--subtext:#5f7290;--legend-text:#8fa3c0;--footer:#43536e;--flow-node-fill:rgba(56,189,248,0.05);--flow-node-stroke:#38bdf8;--flow-pill-fill:rgba(45,212,191,0.08);--flow-pill-stroke:#2dd4bf;--flow-conn:#38bdf8;--flow-dot:#2dd4bf;--arch-conn:#5f7290;--arch-async:#fbbf24;--arch-auth:#f472b6;--arch-dot:#2dd4bf;--node-base:#0a1120;--region:#fbbf24;--subnet:#f472b6;--capsule-fill:rgba(45,212,191,0.14);--capsule-text:#2dd4bf;--t-frontend-fill:rgba(13,64,80,0.45);--t-frontend-stroke:#2dd4bf;--t-backend-fill:rgba(12,56,90,0.45);--t-backend-stroke:#38bdf8;--t-database-fill:rgba(70,32,110,0.45);--t-database-stroke:#c084fc;--t-cloud-fill:rgba(110,70,14,0.35);--t-cloud-stroke:#fbbf24;--t-security-fill:rgba(120,26,70,0.40);--t-security-stroke:#f472b6;--t-bus-fill:rgba(110,70,14,0.35);--t-bus-stroke:#fbbf24;--t-external-fill:rgba(35,46,66,0.5);--t-external-stroke:#8fa3c0;--accent-0:#2dd4bf;--accent-1:#c084fc;--accent-2:#f472b6;--accent-3:#38bdf8;--pulse:#2dd4bf; }
:root[data-theme="light"] { --bg:#e8eef5;--grid:#d3dded;--card-bg:#f8fafc;--border:#cbd5e1;--border-hi:#94a3b8;--text:#0f172a;--subtext:#64748b;--legend-text:#475569;--footer:#94a3b8;--flow-node-fill:rgba(5,150,105,0.08);--flow-node-stroke:#059669;--flow-pill-fill:rgba(4,120,87,0.12);--flow-pill-stroke:#047857;--flow-conn:#059669;--flow-dot:#059669;--arch-conn:#64748b;--arch-async:#ea580c;--arch-auth:#e11d48;--arch-dot:#0891b2;--node-base:#ffffff;--region:#d97706;--subnet:#e11d48;--capsule-fill:rgba(8,145,178,0.12);--capsule-text:#0e7490;--t-frontend-fill:rgba(8,145,178,0.10);--t-frontend-stroke:#0891b2;--t-backend-fill:rgba(5,150,105,0.10);--t-backend-stroke:#059669;--t-database-fill:rgba(124,58,237,0.10);--t-database-stroke:#7c3aed;--t-cloud-fill:rgba(217,119,6,0.10);--t-cloud-stroke:#d97706;--t-security-fill:rgba(225,29,72,0.10);--t-security-stroke:#e11d48;--t-bus-fill:rgba(234,88,12,0.10);--t-bus-stroke:#ea580c;--t-external-fill:rgba(100,116,139,0.10);--t-external-stroke:#64748b;--accent-0:#0891b2;--accent-1:#7c3aed;--accent-2:#e11d48;--accent-3:#059669;--pulse:#059669; }
@media (prefers-color-scheme: light) { :root:not([data-theme]) { --bg:#e8eef5;--grid:#d3dded;--card-bg:#f8fafc;--border:#cbd5e1;--border-hi:#94a3b8;--text:#0f172a;--subtext:#64748b;--legend-text:#475569;--footer:#94a3b8;--flow-node-fill:rgba(5,150,105,0.08);--flow-node-stroke:#059669;--flow-pill-fill:rgba(4,120,87,0.12);--flow-pill-stroke:#047857;--flow-conn:#059669;--flow-dot:#059669;--arch-conn:#64748b;--arch-async:#ea580c;--arch-auth:#e11d48;--arch-dot:#0891b2;--node-base:#ffffff;--region:#d97706;--subnet:#e11d48;--capsule-fill:rgba(8,145,178,0.12);--capsule-text:#0e7490;--t-frontend-fill:rgba(8,145,178,0.10);--t-frontend-stroke:#0891b2;--t-backend-fill:rgba(5,150,105,0.10);--t-backend-stroke:#059669;--t-database-fill:rgba(124,58,237,0.10);--t-database-stroke:#7c3aed;--t-cloud-fill:rgba(217,119,6,0.10);--t-cloud-stroke:#d97706;--t-security-fill:rgba(225,29,72,0.10);--t-security-stroke:#e11d48;--t-bus-fill:rgba(234,88,12,0.10);--t-bus-stroke:#ea580c;--t-external-fill:rgba(100,116,139,0.10);--t-external-stroke:#64748b;--accent-0:#0891b2;--accent-1:#7c3aed;--accent-2:#e11d48;--accent-3:#059669;--pulse:#059669; } }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace; background: var(--bg);
         min-height: 100vh; padding: 2rem; color: var(--text); }
  .container { max-width: 960px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.4rem; }
  .pulse-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--pulse); }
  h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
  .capsule { display: inline-block; background: var(--capsule-fill); color: var(--capsule-text);
    border: 1px solid var(--capsule-text); border-radius: 999px; padding: 0 14px;
    margin-left: 10px; font-size: 1.05rem; line-height: 1.75; }
  .sig { margin-left: auto; color: var(--text); font-size: 0.85rem; font-weight: 600;
    text-shadow: -1px 1px 0 var(--accent-1), 1px -1px 0 var(--accent-0); opacity: 0.85; }
  .subtitle { color: var(--subtext); font-size: 0.8rem; margin-bottom: 1.5rem; }
  .diagram-card { border: 1px solid var(--border); border-radius: 12px; position: relative;
    background: repeating-linear-gradient(0deg, var(--grid) 0 0.5px, transparent 0.5px 40px),
      repeating-linear-gradient(90deg, var(--grid) 0 0.5px, transparent 0.5px 40px), var(--card-bg);
    padding: 1.25rem 1rem; }
  .ctrls { position: absolute; top: 12px; right: 12px; z-index: 2; display: flex; gap: 6px; }
  .ctrl { background: transparent; border: 1px solid var(--border); color: var(--subtext);
    border-radius: 6px; padding: 4px 10px; font: inherit; font-size: 11px; cursor: pointer; }
  .ctrl:hover { color: var(--text); border-color: var(--border-hi); }
  .footer { color: var(--footer); font-size: 0.7rem; margin-top: 1rem; }
  .flow { stroke-dasharray: 5 5; }
  .flow-async { stroke-dasharray: 2 4; }
  .flow-auth { stroke-dasharray: 4 4; }
  .halo { opacity: 0; }
  @media (prefers-reduced-motion: no-preference) {
    .flow { animation: dashmove 0.75s linear infinite; }
    .flow-async { animation: dashasync 0.9s linear infinite; }
    .flow-auth { animation: dashauth 1.2s linear infinite; }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
    .halo { animation: halo 4.8s ease-in-out infinite; }
  }
  @keyframes dashmove { to { stroke-dashoffset: -10; } }
  @keyframes dashasync { to { stroke-dashoffset: -12; } }
  @keyframes dashauth { to { stroke-dashoffset: -8; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes halo { 0%, 20%, 100% { opacity: 0; } 7% { opacity: 0.8; } 13% { opacity: 0.3; } }
  body.paused .flow, body.paused .flow-async, body.paused .flow-auth,
  body.paused .pulse-dot, body.paused .halo { animation-play-state: paused; }

<script>
(function () {
  // Theme toggle — flips [data-theme] on <html>; all colors are CSS vars, so
  // one attribute change repaints CSS and inline SVG together. Independent of
  // reduced-motion, so it is wired first and always.
  var root = document.documentElement;
  var tbtn = document.getElementById('themeBtn');
  if (tbtn) {
    var mq = matchMedia('(prefers-color-scheme: light)');
    var cur = function () {
      return root.getAttribute('data-theme') || (mq.matches ? 'light' : 'dark');
    };
    var sync = function () {
      var c = cur();
      tbtn.textContent = c === 'light' ? '\u263e dark' : '\u2600 light';
      tbtn.setAttribute('aria-label', 'Switch to ' + (c === 'light' ? 'dark' : 'light') + ' theme');
    };
    tbtn.addEventListener('click', function () {
      root.setAttribute('data-theme', cur() === 'light' ? 'dark' : 'light');
      sync();
    });
    mq.addEventListener && mq.addEventListener('change', sync);
    sync();
  }
  var svg = document.getElementById('flowsvg');
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.querySelectorAll('.dot, .trail').forEach(function (d) { d.remove(); });
    var b = document.getElementById('pauseBtn'); if (b) b.remove(); return;
  }
  var btn = document.getElementById('pauseBtn'); if (!btn) return; var paused = false;
  btn.addEventListener('click', function () {
    paused = !paused; document.body.classList.toggle('paused', paused);
    paused ? svg.pauseAnimations() : svg.unpauseAnimations();
    btn.textContent = paused ? '\u25b6 play' : '\u23f8 pause';
    btn.setAttribute('aria-pressed', String(paused));
  });
})();
</script>
